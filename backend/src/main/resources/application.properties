# Server Configuration
server.port=${PORT:8080}

# CORS Configuration (configurable por entorno)
# Separar múltiples orígenes por comas: http://localhost,https://localhost,https://mi-railway.up.railway.app
cors.allowed-origins=http://localhost,https://localhost,http://localhost:3000,capacitor://localhost,https://biosenseiot-production-e061.up.railway.app

# Database Configuration
spring.r2dbc.url=r2dbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}${R2DBC_SSL_OPTIONS:?sslmode=require}
spring.r2dbc.username=${PGUSER}
spring.r2dbc.password=${PGPASSWORD}

# Database initialization
# El esquema es idempotente; puede ejecutarse varias veces sin borrar datos.
spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.sql.init.schema-locations=classpath:schema.sql
spring.r2dbc.initialization-mode=${R2DBC_INIT_MODE:always}

# Google OAuth2 Client Configuration
# For mobile app token exchange, we only need the client ID to verify the token
# Se recomienda pasar una lista separada por comas: ID_WEB,ID_ANDROID
google.client.ids=${GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET}
# JWT Configuration for Mobile App
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Security Logging
logging.level.org.springframework.security=INFO
